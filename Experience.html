<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0c0f;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #e3d9cd;
            line-height: 1.6;
            padding: 2rem 1.5rem;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== WIND-BLOWN BINARY (copied from index) ===== */
        .binary-wind {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .wind-particle {
            position: absolute;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: rgba(80, 220, 255, 0.5);
            text-shadow: 0 0 8px cyan, 0 0 18px #0066ff;
            font-size: 1.6rem;
            user-select: none;
            white-space: nowrap;
            opacity: 0;
            animation: diagonalWind linear infinite;
            mix-blend-mode: screen;
            z-index: 101;
        }

        @keyframes diagonalWind {
            0% {
                transform: translate(-10%, -10%) rotate(2deg);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translate(110vw, 110vh) rotate(8deg);
                opacity: 0;
            }
        }

        .wind-particle.alt-direction {
            animation: diagonalWindAlt linear infinite;
        }

        @keyframes diagonalWindAlt {
            0% {
                transform: translate(110%, -10%) rotate(-3deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            100% {
                transform: translate(-20vw, 110vh) rotate(-10deg);
                opacity: 0;
            }
        }

        /* main card */
        .portfolio-card {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(20, 22, 27, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            padding: 2.5rem 3rem;
            box-shadow: 0 25px 45px -10px rgba(0, 20, 40, 0.7);
            border: 1px solid rgba(80, 140, 200, 0.4);
        }

        /* header with cartoon character */
        .header-with-character {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 0.2rem;
        }

        .cartoon-character {
            font-size: 4rem;
            line-height: 1;
            filter: drop-shadow(0 0 10px #80a0ff);
            animation: bounce 2s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #aaccff, #d4b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
            margin: 0;
        }

        /* text readability */
        h2, h3, p, li, a, span {
            position: relative;
            z-index: 11;
            text-shadow: 0 2px 6px rgba(0,0,0,0.8);
        }

        h2 {
            font-size: 2rem;
            margin: 2rem 0 1rem 0;
            border-bottom: 2px solid #2e3a48;
            padding-bottom: 0.5rem;
            color: #d6c9bb;
        }

        h3 {
            font-size: 1.4rem;
            margin: 1.8rem 0 0.8rem 0;
            color: #cfc1b2;
        }

        .nav-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.8rem;
            align-items: center;
            margin: 1.5rem 0 1.2rem 0;
            padding: 0.75rem 0;
            border-top: 1px solid #2e3a48;
            border-bottom: 1px solid #2e3a48;
        }

        .nav-bar a {
            text-decoration: none;
            color: #b9cfef;
            font-weight: 500;
            font-size: 1.05rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .nav-bar a i {
            color: #8f9fbb;
        }

        .nav-bar a:hover {
            color: #b0e0ff;
            text-shadow: 0 0 5px #2f6f9f;
        }

        .separator {
            color: #3e4d5e;
        }

        .contact-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem 2.5rem;
            background: #1a1f28;
            padding: 1rem 2rem;
            border-radius: 60px;
            margin: 1.5rem 0 2rem 0;
            align-items: center;
            font-size: 0.98rem;
            border: 1px solid #31465a;
        }

        .contact-strip a, .contact-strip span {
            text-decoration: none;
            color: #cfdbed;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .contact-strip i {
            color: #83a6d1;
        }

        .badge {
            background: #1d3142;
            border-radius: 40px;
            padding: 0.2rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #bfd2e6;
            display: inline-block;
        }

        /* Story blocks - dark theme version */
        .story-block {
            background: #1a222e;
            border-radius: 2rem;
            padding: 1.8rem 2.2rem;
            margin-bottom: 2rem;
            border: 1px solid #31465a;
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .story-block:hover {
            transform: translateY(-4px);
            border-color: #80b0da;
        }

        .story-block.education {
            border-left: 6px solid #4f789b;
        }

        .story-block.work {
            border-left: 6px solid #9b7f99;
        }

        .story-icon {
            font-size: 2rem;
            background: #1f2631;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #4f789b;
            margin-right: 1rem;
        }

        .story-title {
            font-size: 1.7rem;
            font-weight: 650;
            color: #b9cfef;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 1.2rem;
        }

        .story-title i {
            color: #83a6d1;
        }

        .story-sub {
            font-size: 1rem;
            color: #a0b2c4;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.15rem;
            margin-bottom: 1.2rem;
        }

        .story-desc {
            padding-left: 1rem;
            border-left: 3px dashed #35485b;
            margin-top: 1rem;
        }

        .story-desc p {
            margin-bottom: 0.7rem;
            display: flex;
            gap: 0.8rem;
            align-items: baseline;
            color: #cfdbed;
        }

        .story-desc i {
            color: #83a6d1;
            width: 1.5rem;
            text-align: center;
        }

        .soft-badge {
            background: #1d3142;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #bfd2e6;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .course-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin: 1.5rem 0 1rem;
        }

        .course-tag {
            background: #1d3142;
            border: 1px solid #4f789b;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            color: #cfdbed;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

            color: #83a6d1;
        }
